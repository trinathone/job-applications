upstream jam_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Frontend (static) ────────────────────────────────────────────────────
    root /srv/jam/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://jam_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Timeouts for normal endpoints
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── SSE / streaming — no buffering ────────────────────────────────────────
    location /api/dashboard/stream {
        proxy_pass http://jam_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Cache-Control no-cache;

        # Critical: disable buffering for SSE
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;  # 1 hour max connection
        chunked_transfer_encoding on;

        add_header X-Accel-Buffering no;
    }

    location /api/dashboard/tailor {
        proxy_pass http://jam_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
        add_header X-Accel-Buffering no;
    }

    # ── Metrics (internal only) ───────────────────────────────────────────────
    location /metrics {
        proxy_pass http://jam_api;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }
}
