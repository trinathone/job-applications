name: Cloud Scrape

on:
  workflow_dispatch:
  schedule:
    # 7 AM, 11 AM, 4 PM Eastern during daylight saving time.
    - cron: "0 11,15,20 * * *"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend
        run: curl -fsS --retry 3 --retry-delay 10 https://job-applications-5m2m.onrender.com/api/health

      - name: Start scrape
        run: |
          curl -fsS -X POST \
            -H "X-Scrape-Token: ${{ secrets.SCRAPE_TRIGGER_TOKEN }}" \
            https://job-applications-5m2m.onrender.com/api/scrape/run
